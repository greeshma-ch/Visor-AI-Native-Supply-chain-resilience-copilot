services:
  - type: web
    name: visor-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npx tsx server.ts
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false   # Set this to your Vercel frontend URL e.g. https://visor.vercel.app
      - key: NODE_ENV
        value: production
